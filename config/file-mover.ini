# ============================================================================
# Background File Mover — reference configuration
# ============================================================================
# This is the fully-commented reference configuration. Install a copy at
# /etc/file-mover/file-mover.ini (owned root:mover, mode 0640) and edit the
# paths for your deployment. Every option shown below is the compiled default;
# the loader (Milestone 2) rejects any unknown section or key, so a typo fails
# loudly rather than being silently ignored.
#
# See docs/CONFIG-REFERENCE.md for the authoritative per-option reference.
# ============================================================================

[service]
# Durable state root: SQLite database, manifests, and recovery records.
state_directory = /var/lib/file-mover
# Authoritative job/file state database.
database_path = /var/lib/file-mover/jobs.db
# Human-readable transfer manifests (one per job).
manifest_directory = /var/lib/file-mover/manifests
# Unix control socket the CLI connects to (recreated each boot by systemd).
socket_path = /run/file-mover/control.sock
# Seconds to allow in-flight work to reach a safe checkpoint during shutdown.
shutdown_timeout_seconds = 60
# How often the transfer scheduler polls for runnable jobs, in seconds.
poll_interval_seconds = 2

[control]
# Permission bits for the control socket (owner + group read/write only).
socket_mode = 0660
# Size of the dedicated control thread pool (kept separate from transfer workers
# so a saturated copy pool never blocks status/health queries).
max_concurrent_requests = 8
# Per-request timeout for the control server, in seconds.
request_timeout_seconds = 30
# Maximum accepted control-message size, in bytes; rejected before allocation.
maximum_message_bytes = 1048576

[paths]
# Colon-free, newline- or comma-separated absolute roots that submissions may
# draw sources from / write destinations to. Source and destination roots must
# not overlap and must be on different filesystems (cross-mount copy).
allowed_source_roots = /recordings
allowed_destination_roots = /processing
# Per-source staging directory into which submitted files are atomically claimed.
# SWIT-prefixed so partially-moved artifacts are unmistakably owned by this service.
claim_directory_name = .swit-moving
# Prefix for in-progress destination files, published atomically on completion.
temporary_file_prefix = .swit-partial-
# Reject symbolic links during inventory and claiming (recommended default).
reject_symbolic_links = true

[transfer]
# One active job at a time; tune upward only after measuring NFS/network load.
max_concurrent_jobs = 1
# Files copied concurrently within a job.
max_concurrent_files = 2
# Bounded copy buffer, in bytes (floor 65536 / 64 KiB; default 8 MiB).
copy_buffer_size_bytes = 8388608
# Aggregate copy-throughput ceiling in bytes per second, enforced across all
# concurrent file copies by a userspace token bucket (0 = unlimited, the default).
# A non-zero limit forces the buffered copy path because kernel-assisted copy
# (copy_file_range) cannot be paced from userspace. Adjust live without a restart
# with `file-mover throttle <bytes-per-second>`; query the current value in
# `file-mover health`.
max_bytes_per_second = 0
# Maximum automatic retry attempts for a retryable failure (0 disables retries).
retry_limit = 10
# Exponential-backoff bounds, in seconds (max must be >= initial).
retry_initial_delay_seconds = 10
retry_max_delay_seconds = 900
# Attempt a kernel-assisted copy (copy_file_range) that moves bytes directly
# between file descriptors, falling back to the buffered loop when the syscall
# is unavailable or the source/destination pair does not support it. Set to
# false to always use the buffered loop (e.g. to A/B benchmark during NFS
# qualification).
use_kernel_copy = true
# Resume an interrupted copy from its fsynced partial (.swit-partial-) instead of
# restarting the file from byte zero. A clean pause resumes exactly; a crash-torn
# partial is caught by hash verification and restarts. Set false to always restart
# interrupted files from zero (and to drop stale partials during startup recovery).
resume_partial_files = true

[integrity]
# Master switch for integrity verification.
enabled = true
# One of: metadata | source-hash | source-and-destination-hash
mode = source-and-destination-hash
# One of: sha256 | sha512 | blake2b  (all provided by hashlib)
algorithm = sha256

[stability]
# Defensive check that source files are not still being written. This does NOT
# replace the orchestration system's responsibility to submit only completed
# recordings.
enabled = true
# Number of metadata observations (must be >= 2).
poll_count = 2
# Seconds between observations (must be > 0).
poll_interval_seconds = 5

[logging]
# One of: DEBUG | INFO | WARNING | ERROR
level = INFO
# Emit to the systemd journal (stderr) and/or a log file.
log_to_journal = true
log_to_file = false
