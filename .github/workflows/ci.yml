name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python:
    name: Python ${{ matrix.python-version }} (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Full version matrix on Linux (production target is 3.10).
          - { os: ubuntu-latest,  python-version: "3.10" }
          - { os: ubuntu-latest,  python-version: "3.11" }
          - { os: ubuntu-latest,  python-version: "3.12" }
          - { os: ubuntu-latest,  python-version: "3.13" }
          - { os: ubuntu-latest,  python-version: "3.14" }
          # Cross-platform smoke on Windows: the support pin (3.12) plus latest (3.14).
          - { os: windows-latest, python-version: "3.12" }
          - { os: windows-latest, python-version: "3.14" }

    steps:
      - name: Normalize git line endings on Windows
        if: runner.os == 'Windows'
        shell: bash
        run: |
          git config --global core.autocrlf false
          git config --global core.eol lf

      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install Poetry
        run: pipx install poetry==2.3.4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: poetry
          cache-dependency-path: poetry.lock

      - name: Install dependencies
        run: poetry install --no-interaction --no-ansi

      - name: Run tests
        run: poetry run pytest

      - name: Validate package metadata and lockfile
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12'
        run: poetry check --strict --lock

      - name: Build package
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12'
        run: poetry build

  python-coverage:
    name: Python coverage gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: pipx install poetry==2.3.4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: poetry
          cache-dependency-path: poetry.lock
      - run: poetry install --no-interaction --no-ansi
      - name: Enforce coverage gate
        # The floor (fail_under) lives in pyproject.toml [tool.coverage.report].
        run: poetry run pytest --cov --cov-report=term-missing --cov-report=xml
      - name: Upload coverage report
        uses: actions/upload-artifact@v6
        with:
          name: coverage-xml
          path: coverage.xml
          if-no-files-found: error

  mypy:
    name: Python type check (mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: pipx install poetry==2.3.4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: poetry
          cache-dependency-path: poetry.lock
      - run: poetry install --no-interaction --no-ansi
      # mypy analyzes as python_version 3.10 (pyproject [tool.mypy]) regardless of runner.
      - run: poetry run mypy src

  ruff:
    name: Python lint + format (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: pipx install poetry==2.3.4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: poetry
          cache-dependency-path: poetry.lock
      - run: poetry install --no-interaction --no-ansi
      - run: poetry run ruff check
      - run: poetry run ruff format --check

  pylint:
    name: Python lint (pylint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: pipx install poetry==2.3.4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: poetry
          cache-dependency-path: poetry.lock
      - run: poetry install --no-interaction --no-ansi
      - run: poetry run pylint src/file_mover

  vulture:
    name: Python dead code (vulture)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: pipx install poetry==2.3.4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: poetry
          cache-dependency-path: poetry.lock
      - run: poetry install --no-interaction --no-ansi
      - run: poetry run vulture

  bandit:
    name: Python security (bandit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: pipx install poetry==2.3.4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: poetry
          cache-dependency-path: poetry.lock
      - run: poetry install --no-interaction --no-ansi
      - run: poetry run bandit -r src/file_mover

  trace-matrix:
    name: Requirements trace matrix
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Verify TRACE-MATRIX.md is up to date
        run: python scripts/build-trace-matrix.py --check
