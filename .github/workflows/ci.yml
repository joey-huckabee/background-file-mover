name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Linux tests run inside official python:X-slim Docker containers (GitHub Actions job
  # `container:` is Linux-only). The full suite runs — unit, doctor, and the POSIX
  # end-to-end tests (AF_UNIX control plane + fcntl process lock) that a container provides.
  linux-container:
    name: Linux container (python:${{ matrix.python-version }}-slim)
    runs-on: ubuntu-latest
    container:
      image: python:${{ matrix.python-version }}-slim
    strategy:
      fail-fast: false
      matrix:
        # Production target is 3.10; test the full supported range.
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
    steps:
      - name: Install container prerequisites
        run: apt-get update && apt-get install -y --no-install-recommends git

      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install Poetry
        run: pip install --no-cache-dir poetry==2.3.4

      - name: Install dependencies
        run: poetry install --no-interaction --no-ansi

      - name: Run full test suite (unit, doctor, end-to-end)
        run: poetry run pytest

  # Windows testing runs on the VM runner: GitHub Actions does not support Windows job
  # containers. The full suite runs; the POSIX-only end-to-end tests auto-skip (the
  # service cannot run on Windows — doctor reports ENVIRONMENT_UNSUPPORTED there), so this
  # job exercises the cross-platform logic and the full doctor test suite.
  windows:
    name: Windows ${{ matrix.python-version }} (VM)
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        # The support pin (3.12) plus latest (3.14).
        python-version: ["3.12", "3.14"]
    steps:
      - name: Normalize git line endings
        shell: bash
        run: |
          git config --global core.autocrlf false
          git config --global core.eol lf

      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install Poetry
        run: pipx install poetry==2.3.4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: poetry
          cache-dependency-path: poetry.lock

      - name: Install dependencies
        run: poetry install --no-interaction --no-ansi

      - name: Run full test suite (POSIX-only end-to-end tests auto-skip)
        run: poetry run pytest

  # Package build + lockfile validation (moved out of the test matrix).
  package:
    name: Package build + lockfile
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: pipx install poetry==2.3.4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: poetry
          cache-dependency-path: poetry.lock
      - run: poetry install --no-interaction --no-ansi
      - run: poetry check --strict --lock
      - run: poetry build

  python-coverage:
    name: Python coverage gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: pipx install poetry==2.3.4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: poetry
          cache-dependency-path: poetry.lock
      - run: poetry install --no-interaction --no-ansi
      - name: Enforce coverage gate
        # The floor (fail_under) lives in pyproject.toml [tool.coverage.report].
        run: poetry run pytest --cov --cov-report=term-missing --cov-report=xml
      - name: Upload coverage report
        uses: actions/upload-artifact@v6
        with:
          name: coverage-xml
          path: coverage.xml
          if-no-files-found: error

  mypy:
    name: Python type check (mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: pipx install poetry==2.3.4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: poetry
          cache-dependency-path: poetry.lock
      - run: poetry install --no-interaction --no-ansi
      # mypy analyzes as python_version 3.10 (pyproject [tool.mypy]) regardless of runner.
      - run: poetry run mypy src

  ruff:
    name: Python lint + format (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: pipx install poetry==2.3.4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: poetry
          cache-dependency-path: poetry.lock
      - run: poetry install --no-interaction --no-ansi
      - run: poetry run ruff check
      - run: poetry run ruff format --check

  pylint:
    name: Python lint (pylint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: pipx install poetry==2.3.4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: poetry
          cache-dependency-path: poetry.lock
      - run: poetry install --no-interaction --no-ansi
      - run: poetry run pylint src/file_mover

  vulture:
    name: Python dead code (vulture)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: pipx install poetry==2.3.4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: poetry
          cache-dependency-path: poetry.lock
      - run: poetry install --no-interaction --no-ansi
      - run: poetry run vulture

  bandit:
    name: Python security (bandit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: pipx install poetry==2.3.4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: poetry
          cache-dependency-path: poetry.lock
      - run: poetry install --no-interaction --no-ansi
      - run: poetry run bandit -r src/file_mover

  trace-matrix:
    name: Requirements trace matrix
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Verify TRACE-MATRIX.md is up to date
        run: python scripts/build-trace-matrix.py --check
