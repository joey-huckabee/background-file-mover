# ----------------------------------------
# CodeQL Security Scan
# ----------------------------------------
# Builds a CodeQL database for the Python package and reports findings to GitHub
# code scanning (Security tab). Python needs no build, so CodeQL extracts the
# database directly from source (build-mode: none).
# ----------------------------------------

name: CodeQL Security Scan

on:
  workflow_dispatch:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]
  schedule:
    - cron: '0 3 * * 1'  # weekly, Monday 03:00 UTC

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest

    permissions:
      security-events: write  # upload SARIF results to GitHub code scanning
      actions: read           # read metadata about the actions used
      contents: read          # check out the repository

    strategy:
      fail-fast: false
      matrix:
        include:
          - language: python
            build-mode: none

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{ matrix.language }}"
